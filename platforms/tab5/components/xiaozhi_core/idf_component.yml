## IDF Component Manager Manifest File for xiaozhi_core
## Dependencies required to build xiaozhi-esp32 on M5Stack Tab5
dependencies:
  idf: '>=5.3'

  ## WiFi management, WebSocket client (via esp-ml307), SSID provisioning
  78/esp-wifi-connect: ~3.1.3
  78/esp-ml307: ~3.6.5

  ## Fonts for xiaozhi UI (font_puhui_basic_30_4, font_awesome_30_4)
  78/xiaozhi-fonts: ~1.6.0

  ## OPUS audio codec (encode + decode)
  espressif/esp_audio_codec: ~2.4.1
  espressif/esp_audio_effects: ~1.2.1
  espressif/esp_codec_dev: ~1.5.6

  ## Wake-word / AFE speech recognition
  espressif/esp-sr:
    version: ~2.3.0
    rules:
      - if: target in [esp32p4]

  ## Button driver
  espressif/button: ~4.1.5

  ## JPEG encode/decode + image effects (used by display/lvgl_display/jpg/)
  espressif/esp_new_jpeg: ^0.6.1
  espressif/esp_image_effects: ^1.1.0

  ## ADC battery monitor (boards/common/adc_battery_monitor.cc)
  espressif/adc_battery_estimation: ^0.2.1
