<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>把 M5Tab5 变成本地 AI 智能终端</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div
      id="m5tab5-local-ai-terminal"
      data-composition-id="m5tab5-local-ai-terminal"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="420"
    >
      <section id="s1" class="scene scene-hook">
        <div class="scene-header">
          <div>
            <div class="eyebrow" data-field="eyebrow"></div>
            <h1 class="title" data-field="heading"></h1>
            <p class="subtitle" data-field="subtitle"></p>
          </div>
          <div class="timecode" data-field="timeline"></div>
        </div>
        <div class="hero-layout" data-layout-allow-overflow>
          <div class="device-wrap">
            <div class="device">
              <img class="device-frame-asset" src="./assets/generated/m5tab5-device-frame.svg" alt="" />
              <div class="device-screen">
                <div class="screen-title">M5Tab5</div>
                <div class="screen-subtitle">Local AI Terminal</div>
                <div class="screen-grid" data-app-flashes></div>
              </div>
            </div>
          </div>
          <div class="orbit-map" data-orbit-map></div>
        </div>
        <div class="caption-row">
          <div class="caption-track" data-captions></div>
          <div class="evidence-tags" data-scene-evidence></div>
        </div>
      </section>

      <section id="s2" class="scene scene-map">
        <div class="scene-header">
          <div>
            <div class="eyebrow" data-field="eyebrow"></div>
            <h2 class="title" data-field="heading"></h2>
            <p class="subtitle" data-field="subtitle"></p>
          </div>
          <div class="timecode" data-field="timeline"></div>
        </div>
        <div class="system-layout">
          <div class="system-layers" data-system-layers></div>
          <div class="bridge-panel panel">
            <div class="bridge-title">LAN HTTP JSON</div>
            <div class="bridge-line"></div>
            <div class="bridge-copy">secrets stay on Mac</div>
          </div>
        </div>
        <div class="commit-ribbon panel" data-scene-ribbon></div>
        <div class="caption-row">
          <div class="caption-track" data-captions></div>
          <div class="evidence-tags" data-scene-evidence></div>
        </div>
      </section>

      <section id="s3" class="scene scene-features">
        <div class="scene-header">
          <div>
            <div class="eyebrow" data-field="eyebrow"></div>
            <h2 class="title" data-field="heading"></h2>
            <p class="subtitle" data-field="subtitle"></p>
          </div>
          <div class="timecode" data-field="timeline"></div>
        </div>
        <div class="feature-grid" data-feature-grid></div>
        <div class="caption-row">
          <div class="caption-track" data-captions></div>
          <div class="evidence-tags" data-scene-evidence></div>
        </div>
      </section>

      <section id="s4" class="scene scene-ai">
        <div class="scene-header">
          <div>
            <div class="eyebrow" data-field="eyebrow"></div>
            <h2 class="title" data-field="heading"></h2>
            <p class="subtitle" data-field="subtitle"></p>
          </div>
          <div class="timecode" data-field="timeline"></div>
        </div>
        <div class="ai-flow" data-ai-flow></div>
        <div class="guardrail-strip panel" data-guardrails></div>
        <div class="caption-row">
          <div class="caption-track" data-captions></div>
          <div class="evidence-tags" data-scene-evidence></div>
        </div>
      </section>

      <section id="s5" class="scene scene-pitfalls">
        <div class="scene-header">
          <div>
            <div class="eyebrow" data-field="eyebrow"></div>
            <h2 class="title" data-field="heading"></h2>
            <p class="subtitle" data-field="subtitle"></p>
          </div>
          <div class="timecode" data-field="timeline"></div>
        </div>
        <div class="pitfall-grid" data-pitfall-grid></div>
        <div class="evidence-line">硬件证据 &gt; 猜测</div>
        <div class="caption-row">
          <div class="caption-track" data-captions></div>
          <div class="evidence-tags" data-scene-evidence></div>
        </div>
      </section>

      <section id="s6" class="scene scene-build">
        <div class="scene-header">
          <div>
            <div class="eyebrow" data-field="eyebrow"></div>
            <h2 class="title" data-field="heading"></h2>
            <p class="subtitle" data-field="subtitle"></p>
          </div>
          <div class="timecode" data-field="timeline"></div>
        </div>
        <div class="terminal-wrap">
          <div class="terminal" data-build-commands></div>
          <div class="checklist" data-verification-checks></div>
        </div>
        <div class="source-strip panel" data-evidence></div>
        <div class="caption-row">
          <div class="caption-track" data-captions></div>
          <div class="evidence-tags" data-scene-evidence></div>
        </div>
      </section>

      <section id="s7" class="scene scene-close">
        <div class="scene-header">
          <div>
            <div class="eyebrow" data-field="eyebrow"></div>
            <h2 class="title" data-field="heading"></h2>
            <p class="subtitle" data-field="subtitle"></p>
          </div>
          <div class="timecode" data-field="timeline"></div>
        </div>
        <div class="closing-map" data-layout-allow-overflow>
          <div class="device final-device">
            <img class="device-frame-asset" src="./assets/generated/m5tab5-device-frame-closing.svg" alt="" />
            <div class="device-screen">
              <div class="screen-title">M5Tab5</div>
              <div class="screen-subtitle">Local AI Terminal</div>
            </div>
          </div>
          <div class="closing-nodes" data-orbit-map></div>
        </div>
        <div class="commit-ribbon panel" data-scene-ribbon></div>
        <div class="caption-row">
          <div class="caption-track" data-captions></div>
          <div class="evidence-tags" data-scene-evidence></div>
        </div>
      </section>

      <div class="transition-wipe" data-layout-ignore></div>
    </div>
    <script src="./src/vendor/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["m5tab5-local-ai-terminal"] = gsap.timeline({ paused: true });
    </script>
    <script src="./src/story-data.js"></script>
    <script src="./src/timeline.js"></script>
  </body>
</html>
